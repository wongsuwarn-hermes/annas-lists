<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna's Lists — pack together, forget nothing</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9B%BA%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#1E3D32" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0C1B15" media="(prefers-color-scheme: dark)">
<style>
:root{
  --pine:#1E3D32; --pine-deep:#142B23; --lantern:#E9A820; --lantern-deep:#C4880D;
  --birch:#F5F3EC; --night:#20261F; --moss:#5F7A5B;
  --sky:#4A7FA5; --clay:#B4552D; --stone:#8B8778; --line:#DDD8C8;
  --glass:rgba(255,255,255,.78); --glass-line:rgba(255,255,255,.65);
  --r:20px;
  --shadow:0 1px 2px rgba(30,61,50,.05), 0 10px 30px rgba(30,61,50,.10);
  --shadow-hover:0 2px 4px rgba(30,61,50,.06), 0 18px 44px rgba(30,61,50,.16);
  --spring:cubic-bezier(.34,1.56,.64,1); --ease:cubic-bezier(.22,1,.36,1);
  --font-d:"Bricolage Grotesque", system-ui, sans-serif;
  --font-b:"Atkinson Hyperlegible", system-ui, sans-serif;
  --font-m:"IBM Plex Mono", ui-monospace, monospace;
}
*{box-sizing:border-box; margin:0}
body{font-family:var(--font-b); color:var(--night); background:var(--birch); min-height:100vh; overflow-x:hidden}
body::before{
  content:""; position:fixed; inset:-25%; z-index:-1; pointer-events:none;
  background:
    radial-gradient(640px 460px at 18% 8%, rgba(233,168,32,.20), transparent 62%),
    radial-gradient(720px 520px at 86% 16%, rgba(74,127,165,.17), transparent 62%),
    radial-gradient(680px 560px at 46% 96%, rgba(95,122,91,.20), transparent 62%);
  filter:blur(42px); animation:drift 28s ease-in-out infinite alternate;
}
body::after{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background-image:radial-gradient(rgba(30,61,50,.05) 1px, transparent 1.4px);
  background-size:24px 24px;
  -webkit-mask-image:linear-gradient(180deg, transparent, #000 22%);
          mask-image:linear-gradient(180deg, transparent, #000 22%);
}
@keyframes drift{
  0%{transform:translate3d(0,0,0) rotate(0deg) scale(1)}
  100%{transform:translate3d(3%, -2%, 0) rotate(4deg) scale(1.06)}
}
@keyframes fadeUp{from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none}}
button{font-family:inherit; cursor:pointer}
input,select,textarea{font-family:inherit; font-size:1rem}
a{color:var(--pine)}

header{
  position:sticky; top:0; z-index:40; padding:.8rem 1rem;
  background:rgba(20,43,35,.84); backdrop-filter:blur(14px) saturate(1.2);
  -webkit-backdrop-filter:blur(14px) saturate(1.2);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.header-inner{max-width:880px; margin:0 auto; display:flex; align-items:center; gap:1.1rem}
.wordmark{font-family:var(--font-d); font-weight:800; font-size:1.35rem; color:#F5F3EC; text-decoration:none; display:flex; align-items:center; gap:.5rem; letter-spacing:-.01em}
.wordmark span{filter:drop-shadow(0 0 10px rgba(233,168,32,.5))}
.navlink{color:#BFD3C6; text-decoration:none; font-weight:700; font-size:.9rem; transition:color .15s}
.navlink:hover{color:var(--lantern)}
.tagline{font-size:.78rem; color:#9DB8A6; margin-left:auto; font-style:italic}
@media (max-width:560px){ .tagline{display:none} }

main{max-width:880px; margin:0 auto; padding:1.4rem 1rem 5rem}
.crumb{font-size:.85rem; margin-bottom:1rem; color:var(--stone)}
.crumb a{text-decoration:none; font-weight:700}
.crumb span{margin:0 .35rem}
h1{font-family:var(--font-d); font-weight:800; font-size:clamp(1.7rem,4.6vw,2.3rem); color:var(--pine); line-height:1.08; letter-spacing:-.015em}
h2{font-family:var(--font-d); font-weight:700; font-size:1.18rem; color:var(--pine); margin:2rem 0 .6rem; letter-spacing:-.01em}
.sub{color:var(--stone); margin-top:.4rem; max-width:58ch}
.card{
  background:var(--glass); border:1px solid var(--glass-line); border-radius:var(--r);
  box-shadow:var(--shadow); backdrop-filter:blur(14px) saturate(1.05);
  -webkit-backdrop-filter:blur(14px) saturate(1.05);
}
.btn{
  border:0; border-radius:999px; padding:.62rem 1.2rem; font-weight:700; font-size:.95rem;
  background:linear-gradient(180deg,#295241,#16362B); color:#F5F3EC;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14), 0 4px 14px rgba(20,43,35,.28);
  transition:transform .16s var(--spring), box-shadow .16s;
}
.btn:hover{transform:translateY(-1.5px); box-shadow:inset 0 1px 0 rgba(255,255,255,.14), 0 8px 20px rgba(20,43,35,.34)}
.btn:active{transform:translateY(0) scale(.97)}
.btn.amber{background:linear-gradient(180deg,#F5B93B,#DB9A12); color:var(--pine-deep); box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 4px 14px rgba(196,136,13,.35)}
.btn.ghost{background:transparent; color:var(--pine); border:2px solid var(--pine); box-shadow:none}
.btn.small{padding:.38rem .85rem; font-size:.83rem}
.btn:focus-visible,.chip:focus-visible,.pencil:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:3px solid var(--lantern); outline-offset:2px}
.row{display:flex; align-items:center; gap:.6rem; flex-wrap:wrap}
.spacer{flex:1}
.mono{font-family:var(--font-m); font-size:.8rem}

.pencil{
  border:0; width:30px; height:30px; border-radius:50%; flex:none;
  background:rgba(30,61,50,.07); color:var(--pine); font-size:.92rem; line-height:1;
  opacity:.55; transition:all .18s var(--spring);
}
.pencil:hover{opacity:1; background:rgba(30,61,50,.13); transform:rotate(-10deg) scale(1.08)}
.pencil.big{width:36px; height:36px; font-size:1.05rem}

.grid{display:grid; gap:.95rem; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); margin-top:1rem}
.tile{
  padding:1.05rem 1.15rem; display:flex; flex-direction:column; gap:.55rem; text-align:left;
  border-radius:var(--r); transition:transform .22s var(--ease), box-shadow .22s;
  animation:fadeUp .5s var(--ease) both;
}
div.tile[role=button]{cursor:pointer}
button.tile{border:1px solid var(--glass-line)}
.tile:hover{transform:translateY(-3px); box-shadow:var(--shadow-hover)}
.tile .t-name{font-family:var(--font-d); font-weight:700; font-size:1.1rem; color:var(--pine); letter-spacing:-.01em}
.tile .t-meta{font-size:.83rem; color:var(--stone)}
.tile.new{
  border:2px dashed var(--moss); background:transparent; backdrop-filter:none;
  align-items:center; justify-content:center; color:var(--moss); font-weight:700; min-height:100px; box-shadow:none;
}
.tile.new:hover{background:rgba(95,122,91,.09); transform:translateY(-3px)}
.disc{width:38px; height:38px; border-radius:50%; color:#fff; font-family:var(--font-d); font-weight:800; display:inline-flex; align-items:center; justify-content:center; font-size:1rem; flex:none; text-transform:uppercase; box-shadow:inset 0 -2px 4px rgba(0,0,0,.18), 0 2px 6px rgba(30,61,50,.2)}
.progress{height:10px; background:rgba(30,61,50,.10); border-radius:99px; overflow:hidden; margin-top:.2rem}
.progress > span{
  display:block; height:100%; border-radius:99px; position:relative; overflow:hidden;
  background:linear-gradient(90deg,var(--moss),var(--pine)); transition:width .5s var(--ease);
}
.progress > span::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(110deg, transparent 30%, rgba(255,255,255,.35) 50%, transparent 70%);
  transform:translateX(-100%); animation:shine 2.8s ease-in-out infinite;
}
@keyframes shine{ 55%,100%{transform:translateX(100%)} }
.progress.done > span{background:linear-gradient(90deg,var(--lantern),var(--lantern-deep))}
.count-badge{font-family:var(--font-m); font-size:.72rem; background:var(--pine); color:#F5F3EC; border-radius:999px; padding:.22rem .65rem; white-space:nowrap; box-shadow:0 2px 8px rgba(20,43,35,.25)}
.count-badge.today{background:linear-gradient(180deg,#F5B93B,#DB9A12); color:var(--pine-deep)}

.banner{border-radius:var(--r); padding:.85rem 1.05rem; margin-top:1rem; font-size:.92rem; border:1.5px solid; animation:fadeUp .5s var(--ease) both; backdrop-filter:blur(10px)}
.banner.tmrw{background:rgba(255,246,224,.85); border-color:var(--lantern-deep); color:var(--pine-deep)}
.banner.rain{background:rgba(237,244,249,.85); border-color:var(--sky); color:#2C5876}
.banner strong{font-family:var(--font-d)}
.banner .btn{margin-top:.45rem}

.wx{display:flex; gap:.55rem; overflow-x:auto; margin-top:1rem; padding-bottom:.35rem}
.wx-day{background:var(--glass); border:1px solid var(--glass-line); border-radius:16px; padding:.55rem .75rem; text-align:center; min-width:88px; flex:none; box-shadow:var(--shadow); animation:fadeUp .5s var(--ease) both; backdrop-filter:blur(10px)}
.wx-day .d{font-size:.72rem; font-weight:700; color:var(--stone); text-transform:uppercase; letter-spacing:.05em}
.wx-day .i{font-size:1.55rem; line-height:1.45}
.wx-day .t{font-size:.84rem; font-weight:700; color:var(--pine)}
.wx-day .p{font-size:.72rem; color:var(--sky)}
.wx-note{font-size:.78rem; color:var(--stone); font-style:italic; margin-top:.35rem}

.tabs{display:flex; gap:.4rem; margin:1.1rem 0 .4rem; flex-wrap:wrap}
.tab{border:1.5px solid var(--pine); background:transparent; color:var(--pine); border-radius:999px; padding:.42rem 1rem; font-weight:700; font-size:.88rem; transition:all .18s var(--spring)}
.tab:hover{transform:translateY(-1px)}
.tab[aria-selected="true"]{background:linear-gradient(180deg,#295241,#16362B); color:#F5F3EC; box-shadow:0 4px 12px rgba(20,43,35,.28)}
.cat{margin-top:1.15rem; animation:fadeUp .45s var(--ease) both}
.cat-head{display:flex; align-items:baseline; gap:.5rem; border-bottom:2px solid var(--pine); padding-bottom:.25rem; margin-bottom:.35rem}
.cat-head h3{font-family:var(--font-d); font-size:1rem; color:var(--pine); text-transform:uppercase; letter-spacing:.06em}
.cat-head .mono{color:var(--stone)}
ul.items{list-style:none; padding:0}
li.item{display:flex; align-items:center; gap:.7rem; padding:.52rem .35rem; border-bottom:1px dashed var(--line)}
li.item .name{flex:1}
li.item.s-not_needed .name, li.item.s-packed .name{color:var(--stone)}
li.item.s-not_needed .name{text-decoration:line-through}
.del{border:0; background:none; color:var(--stone); font-size:1rem; padding:.2rem .45rem; border-radius:8px; opacity:.5; transition:all .15s}
.del:hover{opacity:1; color:var(--clay); background:rgba(180,85,45,.09)}
.qty{display:inline-flex; align-items:center; gap:.1rem; flex:none; opacity:.45; transition:opacity .15s}
.qty:hover, .qty.multi{opacity:1}
.qty button{border:0; width:22px; height:22px; border-radius:50%; background:rgba(30,61,50,.08); color:var(--pine); font-weight:800; line-height:1; font-size:.85rem; transition:transform .15s var(--spring), background .15s}
.qty button:hover{background:rgba(30,61,50,.16); transform:scale(1.12)}
.qty b{min-width:30px; text-align:center; font-family:var(--font-m); font-size:.78rem; color:var(--pine)}

.chip{
  border:2px solid var(--stone); background:rgba(255,255,255,.85); border-radius:8px 999px 999px 8px;
  padding:.28rem .75rem .28rem .55rem; font-weight:700; font-size:.8rem; min-width:106px;
  display:inline-flex; align-items:center; gap:.4rem; color:var(--stone); text-align:left;
  transition:all .22s var(--spring);
}
.chip::before{content:""; width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.5; flex:none}
.chip:hover{transform:rotate(-2deg) scale(1.04)}
.chip:active{transform:scale(.94)}
.chip.s-packed{border-color:var(--pine); background:linear-gradient(180deg,#295241,#16362B); color:#F5F3EC; box-shadow:0 3px 10px rgba(20,43,35,.3)}
.chip.s-buy{border-color:var(--lantern-deep); background:linear-gradient(180deg,#F5B93B,#DB9A12); color:var(--pine-deep)}
.chip.s-tomorrow{border-color:var(--sky); color:var(--sky); background:rgba(237,244,249,.9)}
.chip.s-not_needed{border-color:var(--line); color:var(--stone); background:rgba(245,243,236,.7)}
.hint{font-size:.8rem; color:var(--stone); margin:.4rem 0 0; font-style:italic}

.packrow{display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.8rem}
.pchip{
  display:inline-flex; align-items:center; gap:.35rem; font-size:.78rem; font-weight:700;
  color:var(--pine); background:rgba(30,61,50,.07); border:1px solid var(--line);
  border-radius:999px; padding:.28rem .45rem .28rem .75rem;
}
.pchip button{border:0; background:none; color:var(--stone); font-size:.75rem; line-height:1; padding:.15rem .3rem; border-radius:50%; cursor:pointer; transition:color .15s}
.pchip button:hover{color:var(--clay)}
.pchip.addp{background:transparent; border:1.5px dashed var(--moss); color:var(--moss); padding:.28rem .75rem; cursor:pointer; transition:background .15s}
.pchip.addp:hover{background:rgba(95,122,91,.09)}
html.dark .pchip{background:rgba(255,255,255,.07)}

@media (pointer:coarse){
  .chip{padding:.5rem .8rem .5rem .6rem}
  .del{padding:.5rem .55rem}
  .qty button{width:28px; height:28px}
  li.item{padding:.6rem .35rem}
  .pencil{width:36px; height:36px}
  .pchip button{padding:.35rem .45rem}
}

/* ---------- mobile de-clutter: rows show chip + name; tap the name for stepper/delete ---------- */
@media (max-width:640px){
  .crumb{white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .packrow{flex-wrap:nowrap; overflow-x:auto; padding-bottom:.2rem}
  .pchip{white-space:nowrap; flex:none}
  li.item .del{display:none}
  li.item .qty button{display:none}
  li.item .qty{opacity:1}
  li.item .qty:not(.multi) b{display:none}
  li.item.open .del{display:block}
  li.item.open .qty button{display:inline-flex}
  li.item.open .qty:not(.multi) b{display:inline}
  li.item.open{background:rgba(30,61,50,.045); border-radius:10px}
  html.dark li.item.open{background:rgba(255,255,255,.05)}
}

.claim{border:1.5px solid var(--line); border-radius:999px; padding:.32rem .7rem; background:rgba(255,255,255,.85); font-size:.85rem; max-width:170px}
.claimed-by{display:inline-flex; align-items:center; gap:.4rem; font-weight:700; font-size:.85rem}
.claimed-by .disc{width:26px; height:26px; font-size:.75rem}

.add-row{display:flex; gap:.5rem; margin-top:1rem}
.add-row input, .add-row select{flex:1; border:1.5px solid var(--line); border-radius:12px; padding:.58rem .85rem; background:rgba(255,255,255,.85); min-width:0}
dialog{
  border:0; border-radius:24px; padding:0; max-width:470px; width:calc(100% - 2rem);
  margin:auto;
  box-shadow:0 24px 70px rgba(20,43,35,.4); background:rgba(255,255,255,.92);
  backdrop-filter:blur(18px);
}
dialog::backdrop{background:rgba(20,43,35,.5); backdrop-filter:blur(3px)}
dialog[open]{animation:fadeUp .3s var(--ease)}
.dlg-body{padding:1.35rem 1.35rem 1.5rem; max-height:82vh; overflow:auto}
.dlg-body h2{margin:0 0 .9rem}
.field{margin-bottom:.95rem}
.field label{display:block; font-weight:700; font-size:.85rem; margin-bottom:.3rem; color:var(--pine)}
.field input, .field textarea{width:100%; border:1.5px solid var(--line); border-radius:12px; padding:.58rem .85rem; background:#fff}
.field textarea{min-height:180px; font-family:var(--font-m); font-size:.82rem; line-height:1.6}
.two{display:grid; grid-template-columns:1fr 1fr; gap:.6rem}
.packs{display:flex; flex-direction:column; gap:.45rem}
.pack{display:flex; align-items:center; gap:.6rem; border:1.5px solid var(--line); border-radius:14px; padding:.58rem .75rem; background:#fff; cursor:pointer; transition:border-color .15s}
.pack:hover{border-color:var(--moss)}
.pack input{accent-color:var(--pine); width:18px; height:18px}
.pack .p-name{font-weight:700; font-size:.92rem}
.pack .p-count{font-size:.78rem; color:var(--stone)}
.pack.special{border-color:var(--lantern-deep); background:linear-gradient(100deg,#FFF8E7,#FFFDF6)}
.pack.special .p-name::after{content:" ⭐"; font-size:.85em}
.empty{padding:2.3rem 1rem; text-align:center; color:var(--stone)}
.empty .big{font-size:2.6rem; display:block; margin-bottom:.5rem}
footer{max-width:880px; margin:2rem auto 0; padding:0 1rem 2rem; font-size:.8rem; color:var(--stone); text-align:center}

.hero-actions{display:flex; flex-wrap:wrap; gap:.6rem; margin-top:1rem}
.demo-note{margin-top:1rem; padding:.8rem 1rem; border-left:4px solid var(--lantern); background:rgba(233,168,32,.11); color:var(--pine-deep); border-radius:14px}
html.dark .demo-note{background:rgba(233,168,32,.12); color:#F4D896}
.ready-card{margin-top:1.15rem; padding:1rem 1.1rem}
.ready-head{display:flex; align-items:center; gap:.65rem; flex-wrap:wrap; margin-bottom:.7rem}
.ready-head strong{font-family:var(--font-d); color:var(--pine); font-size:1.05rem}
.ready-status{border-radius:999px; padding:.22rem .62rem; font-family:var(--font-m); font-size:.72rem; font-weight:700; background:rgba(95,122,91,.13); color:var(--pine)}
.ready-status.warn{background:rgba(233,168,32,.22); color:var(--pine-deep)}
.ready-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:.6rem}
.ready-metric{border:1px solid var(--line); border-radius:14px; padding:.7rem .75rem; background:rgba(255,255,255,.5)}
.ready-metric b{display:block; font-family:var(--font-d); font-size:1.35rem; color:var(--pine); line-height:1}
.ready-metric span{display:block; margin-top:.25rem; color:var(--stone); font-size:.82rem}
.ready-list{margin-top:.75rem; padding-left:1.1rem; color:var(--stone); font-size:.9rem}
.ready-list li{margin:.22rem 0}
.mine-badge{display:inline-flex; align-items:center; gap:.25rem; border-radius:999px; background:rgba(233,168,32,.2); color:var(--pine-deep); font-weight:800; font-size:.74rem; padding:.22rem .55rem; white-space:nowrap}
html.dark .mine-badge{color:#F4D896; background:rgba(233,168,32,.14)}
.mine-pick{border:1.5px dashed var(--moss); background:transparent; color:var(--moss); border-radius:999px; padding:.25rem .55rem; font-weight:700; font-size:.75rem}
.mine-pick:hover{background:rgba(95,122,91,.09)}
.next-step{margin-top:.75rem; color:var(--stone); font-size:.88rem}
@media (max-width:640px){.hero-actions .btn{width:100%; justify-content:center}.ready-grid{grid-template-columns:1fr}.ready-head{align-items:flex-start}.mine-pick{padding:.38rem .65rem}}
.toast{
  position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%) translateY(130%);
  background:rgba(20,43,35,.94); color:#F5F3EC; border-radius:999px; padding:.62rem 1.25rem;
  font-weight:700; font-size:.9rem; transition:transform .3s var(--spring); z-index:60;
  box-shadow:0 10px 30px rgba(20,43,35,.4); backdrop-filter:blur(8px);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.confetti{position:fixed; width:10px; height:10px; border-radius:3px; z-index:70; pointer-events:none; top:0; left:0}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{transition:none !important; animation:none !important}
}

/* ---------- Night camp (dark theme) ---------- */
html.dark{
  --birch:#0C1B15; --night:#EDE9DC; --stone:#7FA391; --line:#274238;
  --glass:rgba(16,36,28,.74); --glass-line:rgba(255,255,255,.09);
  --pine:#BFDCC8; --moss:#8FAF8A;
  --shadow:0 1px 2px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.4);
  --shadow-hover:0 2px 4px rgba(0,0,0,.35), 0 18px 44px rgba(0,0,0,.55);
}
html.dark body::before{
  background:
    radial-gradient(640px 460px at 18% 8%, rgba(240,184,64,.14), transparent 62%),
    radial-gradient(720px 520px at 86% 16%, rgba(95,158,199,.12), transparent 62%),
    radial-gradient(680px 560px at 46% 96%, rgba(95,142,101,.15), transparent 62%);
}
html.dark body::after{background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1.4px)}
html.dark .pencil{background:rgba(255,255,255,.08); color:#CFE3D6}
html.dark .pencil:hover{background:rgba(255,255,255,.16)}
html.dark .qty button{background:rgba(255,255,255,.09); color:#CFE3D6}
html.dark .qty button:hover{background:rgba(255,255,255,.17)}
html.dark .progress{background:rgba(255,255,255,.10)}
html.dark .progress > span{background:linear-gradient(90deg,#C4880D,#F0B840)}
html.dark .progress.done > span{background:linear-gradient(90deg,#F0B840,#FFD97A)}
html.dark .count-badge{background:rgba(255,255,255,.12); color:#EDE9DC}

(function (root, factory) {
  const api = factory();
  if (typeof module === "object" && module.exports) module.exports = api;
  else root.AnnasCloudClient = api;
})(typeof globalThis !== "undefined" ? globalThis : this, function () {
  "use strict";

  const CLOUD_KEY = "annas-cloud-v1";

  function firstRow(data) {
    if (Array.isArray(data)) return data[0] || null;
    return data || null;
  }

  function createCloudClient(options) {
    const supabase = options.supabase;
    const core = options.core;
    const storage = options.storage;
    const now = options.now || (() => new Date());
    const origin = options.origin || (() => location.origin + location.pathname);
    const generateCapability = options.generateCapability || core.generateCapabilityToken;

    if (!supabase) throw new Error("supabase client is required");
    if (!core) throw new Error("sync core is required");
    if (!storage) throw new Error("storage adapter is required");

    function readMap() {
      return core.parseCloudMetadata(storage.get(CLOUD_KEY));
    }

    function writeMap(map) {
      storage.set(CLOUD_KEY, core.serializeCloudMetadata(map));
      return map;
    }

    function metadataFor(localTripId) {
      return readMap().trips[localTripId] || null;
    }

    function remember(localTripId, metadata) {
      const map = readMap();
      map.trips[localTripId] = metadata;
      writeMap(map);
      return metadata;
    }

    async function rpc(name, args) {
      const result = await supabase.rpc(name, args);
      if (result.error) {
        const error = new Error(result.error.message || `Cloud request failed: ${name}`);
        error.code = result.error.code;
        error.details = result.error.details;
        throw error;
      }
      return firstRow(result.data);
    }

    async function createTrip(localTripId, trip) {
      const readKey = generateCapability();
      const editKey = generateCapability();
      const row = await rpc("create_cloud_trip", {
        p_data: trip,
        p_read_token: readKey,
        p_edit_token: editKey
      });
      if (!row || !row.short_id) throw new Error("Cloud trip creation returned no short ID");
      const metadata = {
        shortId: row.short_id,
        readKey,
        editKey,
        owner: Boolean(row.is_owner),
        version: Number(row.version || 1),
        lastSynced: now().toISOString()
      };
      remember(localTripId, metadata);
      return {
        metadata,
        editUrl: core.buildLiveLink({ baseUrl: origin(), shortId: metadata.shortId, key: editKey }),
        readUrl: core.buildLiveLink({ baseUrl: origin(), shortId: metadata.shortId, key: readKey })
      };
    }

    async function readTrip(shortId, key) {
      const row = await rpc("read_cloud_trip", {
        p_short_id: shortId,
        p_token: key || null
      });
      if (!row) {
        const error = new Error("Trip not found or link is no longer valid");
        error.code = "not_found";
        throw error;
      }
      return {
        shortId: row.short_id || shortId,
        trip: row.payload,
        version: Number(row.version),
        canEdit: Boolean(row.can_edit),
        isOwner: Boolean(row.is_owner)
      };
    }

    async function writeTrip(localTripId, trip) {
      const metadata = metadataFor(localTripId);
      if (!metadata || (!metadata.editKey && !metadata.owner)) {
        return { status: "readonly", metadata };
      }
      try {
        const row = await rpc("write_cloud_trip", {
          p_short_id: metadata.shortId,
          p_edit_token: metadata.editKey || null,
          p_expected_version: metadata.version,
          p_data: trip

        if (status === "saved") {
          metadata.version = Number(row.version);
          metadata.lastSynced = now().toISOString();
          remember(localTripId, metadata);
        }
        return { status, metadata, version: row && Number(row.version), remote: row && row.payload };
      } catch (error) {
        return { status: core.classifyCloudResponse(null, error), metadata, error };
      }
    }

    async function claimTrip(shortId, editKey) {
      return rpc("claim_cloud_trip", {
        p_short_id: shortId,
        p_edit_token: editKey
      });
    }

    async function listOwnedTrips() {
      const result = await supabase.rpc("list_owned_cloud_trips");
      if (result.error) throw new Error(result.error.message || "Could not list cloud trips");
      return result.data || [];
    }

    async function rotateTrip(shortId) {
      const readKey = generateCapability();
      const editKey = generateCapability();
      const row = await rpc("rotate_cloud_trip_tokens", {
        p_short_id: shortId,
        p_new_read_token: readKey,
        p_new_edit_token: editKey
      });
      return { row, readKey, editKey };
    }

    async function signInWithGoogle(redirectTo) {
      return supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo }
      });
    }

    async function signInWithEmail(email, redirectTo) {
      return supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: redirectTo }
      });
    }

    async function signOut() {
      return supabase.auth.signOut();
    }

    async function getSession() {
      const result = await supabase.auth.getSession();
      if (result.error) throw new Error(result.error.message || "Could not read sign-in session");
      return result.data.session;
    }

    return {
      CLOUD_KEY,
      metadataFor,
      remember,
      createTrip,
      readTrip,
      writeTrip,
      claimTrip,
      listOwnedTrips,
      rotateTrip,
      signInWithGoogle,
      signInWithEmail,
      signOut,
      getSession
    };
  }

  return { CLOUD_KEY, createCloudClient };

  get(k){ try { return localStorage.getItem(k); } catch(e){ return mem[k] ?? null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } },
  remove(k){ try { localStorage.removeItem(k); } catch(e){ delete mem[k]; } }
};

    items.push({ id:uid(), cat:it[0], name:it[1], qty:it[2]||1, status:"to_pack", src:pid })));
  const g = { id:uid(), name, color:COLORS[trip.groups.length%COLORS.length], packs:packIds, items,
    charge: CHARGE_DEFAULTS.map(n=>({ id:uid(), name:n, status:"to_pack" })),
    shop: [] };
  trip.groups.push(g);
  return g;
}
function progress(g){
  const counted = g.items.filter(i=>i.status!=="not_needed");
  const done = counted.filter(i=>i.status==="packed").length;
  return { done, total: counted.length, pct: counted.length ? Math.round(done/counted.length*100) : 0 };
}
function daysTo(dateStr){
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + "T00:00:00");
  return Math.round((d - today) / 86400000);
}
function countdownLabel(n){
  if (n===null) return "";
  if (n===0) return "It's today! 🎪";
  if (n===1) return "Tomorrow!";
  if (n<0) return "Happy memories";
  return `${n} days to go`;
}
const initials = name => name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("");

/* ============ share links ============ */
function snapshotTripUrl(trip){
  const usedCustom = {};
  trip.groups.flatMap(g=>g.packs).forEach(pid=>{ if (db.packs[pid]) usedCustom[pid]=db.packs[pid]; });
  const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ t:trip, p:usedCustom }))));
  return location.origin + location.pathname + "#share=" + payload;
}
function shareTrip(trip){
  if (window.__annasCloudShare && window.__annasCloudShare(trip)) return;
  copy(snapshotTripUrl(trip), "Trip link copied — send it to the group 📮");
}
function sharePack(pid){
  const p = db.packs[pid]; if (!p) return;
  const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ id:pid, pack:p }))));
  copy(location.origin + location.pathname + "#sharepack=" + payload, `"${p.name}" link copied 🎒`);
}
function copy(url, msg){
  (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject())
    .then(()=>toast(msg)).catch(()=>prompt("Copy this link:", url));
}
function tryImport(){
  let m = location.hash.match(/^#share=(.+)$/);
  if (m){ try {
    const { t, p } = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    Object.assign(db.packs, p||{});
    const i = db.trips.findIndex(x=>x.id===t.id);
    if (i>=0) db.trips[i]=t; else db.trips.push(t);
    save(); history.replaceState(null,"",location.pathname);
    toast("Trip imported ✅"); return { trip:t.id };
  } catch(e){} }
  m = location.hash.match(/^#sharepack=(.+)$/);
  if (m){ try {
    const { id, pack } = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    db.packs[id] = pack; save(); history.replaceState(null,"",location.pathname);
    toast(`Pack "${pack.name}" added to your library 🎒`); return { packs:true };
  } catch(e){} }
  return null;
}

/* ============ weather (Open-Meteo, no key) ============ */
const WX_ICON = c =>
  c===0 ? "☀️" : c<=2 ? "🌤️" : c===3 ? "☁️" : c<=48 ? "🌫️" : c<=57 ? "🌦️" :
  c<=67 ? "🌧️" : c<=77 ? "🌨️" : c<=82 ? "🌧️" : c<=86 ? "🌨️" : "⛈️";
const wxCache = {};
async function forecast(trip){
  if (!trip.where || !trip.start) return { note:"Add a destination and dates in Trip settings to see the forecast." };
  const key = trip.where + trip.start + (trip.end||"");
  if (wxCache[key]) return wxCache[key];
  const n = daysTo(trip.start);
  if (n===null || n>15) return { note:"Forecast appears when the trip is about two weeks away." };
  if (n<0 && daysTo(trip.end||trip.start)<0) return { note:"Trip's over — hope it was dry!" };
  try {
    const geo = await (await fetch("https://geocoding-api.open-meteo.com/v1/search?count=1&name="+encodeURIComponent(trip.where))).json();
    const loc = geo.results && geo.results[0];
    if (!loc) return { note:`Couldn't find "${trip.where}" — try a nearby town name.` };
    const end = trip.end || trip.start;
    const url = "https://api.open-meteo.com/v1/forecast?latitude="+loc.latitude+"&longitude="+loc.longitude+
      "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto"+
      "&start_date="+trip.start+"&end_date="+end;
    const wx = await (await fetch(url)).json();
    if (!wx.daily) return { note:"Forecast not available for those dates yet." };
    const out = { place:loc.name, days: wx.daily.time.map((d,i)=>({
      date:d, code:wx.daily.weather_code[i], hi:Math.round(wx.daily.temperature_2m_max[i]),
      lo:Math.round(wx.daily.temperature_2m_min[i]), rain:wx.daily.precipitation_probability_max[i] })) };
    wxCache[key] = out;
    return out;
  } catch(e){ return { note:"Couldn't reach the forecast service — it'll work once the site is online." }; }
}

const CONFETTI_COLORS = ["#E9A820","#1E3D32","#4A7FA5","#B4552D","#5F7A5B","#F5B93B"];
function confetti(){
  if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const cx = innerWidth/2, cy = innerHeight*0.32;
  for (let i=0; i<28; i++){
    const s = document.createElement("span");
    s.className = "confetti";
    s.style.background = CONFETTI_COLORS[i%CONFETTI_COLORS.length];
    document.body.appendChild(s);
    const ang = Math.random()*Math.PI*2, dist = 90+Math.random()*180;
    s.animate([
      { transform:`translate(${cx}px,${cy}px) rotate(0) scale(1)`, opacity:1 },
      { transform:`translate(${cx+Math.cos(ang)*dist}px,${cy+Math.sin(ang)*dist+150}px) rotate(${(Math.random()*2-1)*540}deg) scale(.6)`, opacity:0 }
    ], { duration:900+Math.random()*600, easing:"cubic-bezier(.22,1,.36,1)" }).onfinish = ()=>s.remove();
  }
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const disc = (g, cls="") => `<span class="disc ${cls}" style="background:${g.color}" aria-hidden="true">${esc(initials(g.name))}</span>`;

const MY_GROUP_KEY = "annas-my-groups-v1";
function myGroupMap(){ try { return JSON.parse(store.get(MY_GROUP_KEY)||"{}"); } catch(e){ return {}; } }
function myGroupId(trip){ const id = myGroupMap()[trip.id]; return trip.groups.some(g=>g.id===id) ? id : null; }
function setMyGroup(trip, groupId){ const m = myGroupMap(); m[trip.id] = groupId; store.set(MY_GROUP_KEY, JSON.stringify(m)); }
function clearMyGroup(trip){ const m = myGroupMap(); delete m[trip.id]; store.set(MY_GROUP_KEY, JSON.stringify(m)); }
function tripReadiness(trip){
  const unclaimedGear = (trip.communal||[]).filter(i=>!i.claimedBy);
  const unclaimedPantry = (trip.pantry||[]).filter(i=>!i.claimedBy);
  const buyGroups = trip.groups.map(g=>({g, n:g.items.filter(i=>i.status==="buy").length + (g.shop||[]).filter(i=>i.status!=="packed" && i.status!=="not_needed").length})).filter(x=>x.n);
  const tomorrowGroups = trip.groups.map(g=>({g, n:g.items.filter(i=>i.status==="tomorrow").length})).filter(x=>x.n);
  const openGroups = trip.groups.map(g=>({g, p:progress(g)})).filter(x=>x.p.pct<100);
  return { unclaimedGear, unclaimedPantry, buyGroups, tomorrowGroups, openGroups };
}
function readinessCard(trip){
  const r = tripReadiness(trip);
  const blockers = r.unclaimedGear.length + r.unclaimedPantry.length + r.buyGroups.reduce((a,x)=>a+x.n,0) + r.tomorrowGroups.reduce((a,x)=>a+x.n,0);
  const status = !trip.groups.length ? "Add a group to start" : blockers ? "Needs attention" : r.openGroups.length ? "Personal packing left" : "Ready enough";
  const issues = [];
  r.unclaimedGear.slice(0,3).forEach(i=>issues.push(`Claim communal gear: ${esc(i.name)}`));
  r.unclaimedPantry.slice(0,3).forEach(i=>issues.push(`Claim pantry staple: ${esc(i.name)}`));
  r.buyGroups.slice(0,3).forEach(x=>issues.push(`${esc(x.g.name)}: ${x.n} shopping item${x.n===1?"":"s"}`));
  r.tomorrowGroups.slice(0,3).forEach(x=>issues.push(`${esc(x.g.name)}: ${x.n} item${x.n===1?"":"s"} for tomorrow`));
  const hidden = Math.max(0, blockers - issues.length);
  if (hidden) issues.push(`${hidden} more thing${hidden===1?"":"s"} need attention`);
  const myId = myGroupId(trip);
  const mine = trip.groups.find(g=>g.id===myId);
  return `<section class="card ready-card" aria-label="Trip readiness summary">
    <div class="ready-head"><strong>Ready to go?</strong><span class="ready-status ${blockers||!trip.groups.length?"warn":""}">${status}</span>${mine?`<span class="mine-badge">★ Your group: ${esc(mine.name)}</span>`:""}</div>
    <div class="ready-grid">
      <div class="ready-metric"><b>${r.unclaimedGear.length}</b><span>communal gear unclaimed</span></div>
      <div class="ready-metric"><b>${r.unclaimedPantry.length}</b><span>pantry staples unclaimed</span></div>
      <div class="ready-metric"><b>${r.buyGroups.reduce((a,x)=>a+x.n,0)}</b><span>shopping items across groups</span></div>
      <div class="ready-metric"><b>${r.openGroups.length}</b><span>groups still packing</span></div>
    </div>
    ${issues.length?`<ul class="ready-list">${issues.map(i=>`<li>${i}</li>`).join("")}</ul>`:`<p class="next-step">No shared blockers showing. Do one final sweep of each group's personal list before leaving.</p>`}
    ${mine?`<p class="next-step"><button class="btn small" id="openmine">Open ${esc(mine.name)}'s list</button> <button class="mine-pick" id="changemine">Change my group</button></p>`:`${trip.groups.length?`<p class="next-step">Open your group and tap <strong>This is my group</strong> so this device remembers it.</p>`:""}`}
  </section>`;
}

function removePack(trip, g, pid){
  const packs = allPacks();
  const name = (packs[pid]||{}).name || "this pack";
  const fromPack = g.items.filter(i=>i.src===pid);
  const untouched = fromPack.filter(i=>i.status==="to_pack" && (i.qty||1)===1);
  const kept = fromPack.length - untouched.length;
  const msg = untouched.length
    ? `Remove ${untouched.length} untouched item${untouched.length===1?"":"s"} from "${name}"?`+
      (kept ? `\n\nThe ${kept} you've already worked on will stay.` : "")
    : `No untouched items left from "${name}" — everything's been worked on, so the items will stay. Remove the pack label anyway?`;
  if (!confirm(msg)) return;
  untouched.forEach(i=>g.items.splice(g.items.indexOf(i),1));
  g.packs = g.packs.filter(x=>x!==pid);
  save(); render(); toast(`"${name}" removed`);
}

/* ============ theme: aurora by day, night camp after dark ============ */
const THEME_KEY = "annas-theme";
const sysDark = matchMedia("(prefers-color-scheme: dark)");
function applyTheme(){
  const pref = store.get(THEME_KEY);
  const dark = pref ? pref==="dark" : sysDark.matches;
  document.documentElement.classList.toggle("dark", dark);
  const b = document.getElementById("themebtn");
  if (b) b.textContent = pref===null ? "◐" : (dark ? "☾" : "☀");
}
sysDark.addEventListener("change", applyTheme);
document.getElementById("themebtn").addEventListener("click", ()=>{
  const cur = store.get(THEME_KEY);
  const next = cur===null ? "dark" : cur==="dark" ? "light" : null;
  store.set(THEME_KEY, next);
  if (next===null){ try{ localStorage.removeItem(THEME_KEY); }catch(e){ delete mem[THEME_KEY]; } }
  applyTheme();
  toast(next===null ? "Matching your device 📱" : next==="dark" ? "Night camp 🌙" : "Daylight ☀️");
});
applyTheme();

/* ============ optional cloud continuity ============ */
const cloud = { client:null, available:false, started:false, session:null, owned:[], dirty:{}, revision:{}, pulling:{}, timer:null, pushing:false, suppress:false, status:"Local only" };
function cloudConfig(){
  const node = document.getElementById("annas-public-config");
  try { const value = node && JSON.parse(node.textContent); return value && value.url && value.publishableKey ? value : null; } catch (_) { return null; }
}
function cloudTripId(){ return (view.screen==="trip" || view.screen==="group") ? view.a : null; }
function cloudMeta(id){ return cloud.client && id ? cloud.client.metadataFor(id) : null; }
function cloudReadOnly(id){ const meta = cloudMeta(id); return Boolean(meta && !meta.editKey && !meta.owner); }
function cloudMutationTarget(target){
  if (!(target instanceof Element) || !cloudReadOnly(cloudTripId())) return null;
  const selector = view.screen==="trip"
    ? "#edittrip,#groups .pencil,#groups .tile.new,#communal .claim,#communal .del,#commadd,#pantry .claim,#pantry .del,#pantryadd,#banners .rain button"
    : view.screen==="group"
      ? "#editgroup,#packrow button,#body .chip,#body .q-m,#body .q-p,#body .del,#body .add-row"
      : "";
  return selector ? target.closest(selector) : null;
}
function guardCloudMutation(event){
  if (!cloudMutationTarget(event.target)) return;
  if (event.type==="keydown" && event.key!=="Enter") return;
  event.preventDefault(); event.stopImmediatePropagation();
  toast("This is a view-only trip");
}
app.addEventListener("click", guardCloudMutation, true);
app.addEventListener("change", guardCloudMutation, true);
app.addEventListener("keydown", guardCloudMutation, true);
function cloudStatus(text, kind){ cloud.status = text; const pill = document.querySelector("#cloudstatus"); if (pill) { pill.textContent = text; pill.className = "sync-pill" + (kind ? " " + kind : ""); } }
function saveLocalOnly(){ store.set(KEY, JSON.stringify(db)); }
function newLocalId(){ let id; do { id = uid(); } while (db.trips.some(t=>t.id===id)); return id; }
function localForShortId(shortId){
  if (!cloud.client) return null;
  return db.trips.find(t=>{ const meta = cloud.client.metadataFor(t.id); return meta && meta.shortId===shortId; }) || null;
}
function rememberRemote(localId, remote, key){
  const old = cloudMeta(localId) || {};
  const next = { ...old, shortId:remote.shortId, version:remote.version, lastSynced:new Date().toISOString() };
  if (remote.isOwner) next.owner = true;
  if (remote.canEdit && key) next.editKey = key;
  else if (key && !next.editKey) next.readKey = key;
  cloud.client.remember(localId, next);
}
function installRemote(remote, localId, preserveDirty){
  if (!remote || !remote.trip || typeof remote.trip !== "object") throw new Error("Cloud trip payload was invalid");
  const current = db.trips.find(t=>t.id===localId);
  if (preserveDirty && current) db.trips.push(AnnasSyncCore.createRecoveryCopy(current, newLocalId(), new Date()));
  const incoming = JSON.parse(JSON.stringify(remote.trip)); incoming.id = localId;
  if (!Array.isArray(incoming.groups)) incoming.groups=[];
  if (!Array.isArray(incoming.communal)) incoming.communal=[];
  if (!Array.isArray(incoming.pantry)) incoming.pantry=[];
  const index = db.trips.findIndex(t=>t.id===localId);
  if (index >= 0) db.trips[index] = incoming; else db.trips.push(incoming);
  cloud.dirty[localId] = false;
  saveLocalOnly();
  return incoming;
}
function scheduleCloudPush(){
  if (cloud.suppress || !cloud.started || !cloud.client) return;
  const id = cloudTripId(), trip = id && db.trips.find(t=>t.id===id), meta = cloudMeta(id);
  if (!trip || !meta || (!meta.editKey && !meta.owner)) return;
  cloud.dirty[id] = true; cloud.revision[id]=(cloud.revision[id]||0)+1; cloudStatus("Saving…");
  clearTimeout(cloud.timer); cloud.timer = setTimeout(()=>pushCloudTrip(id), 700);
}
async function pushCloudTrip(id){
  if (cloud.pushing || !cloud.dirty[id] || !cloud.client) return;
  const trip = db.trips.find(t=>t.id===id); if (!trip) return;
  const sentRevision=cloud.revision[id]||0;
  cloud.pushing = true; cloudStatus("Saving…");
  const result = await cloud.client.writeTrip(id, trip); cloud.pushing = false;
  if (result.status === "saved") {
    if ((cloud.revision[id]||0)===sentRevision) { cloud.dirty[id]=false; cloudStatus("Saved"); }
    else { cloudStatus("Saving…"); clearTimeout(cloud.timer); cloud.timer=setTimeout(()=>pushCloudTrip(id),0); }
    return;
  }
  if (result.status === "conflict" && result.remote) {
    const remote={ shortId:result.metadata.shortId, version:result.version || result.metadata.version, trip:result.remote, canEdit:true, isOwner:Boolean(result.metadata.owner) };
    installRemote(remote, id, true); rememberRemote(id, remote, result.metadata.editKey || null);
    cloudStatus("Recovery copy created", "warn"); render(); toast("Cloud was newer — your edits are in a recovery copy"); return;
  }
  if (result.status === "readonly") { cloudStatus("View only", "warn"); return; }
  cloudStatus("Offline — changes stay on this device", "offline");
}
async function pullCloudTrip(id){
  const meta = cloudMeta(id); if (!meta || !(meta.editKey || meta.readKey || meta.owner) || !cloud.client || cloud.pulling[id]) return;
  cloud.pulling[id]=true;
  try {
    const remote = await cloud.client.readTrip(meta.shortId, meta.editKey || meta.readKey || null);
    if (remote.version <= meta.version) return;
    const hadLocalChanges = Boolean(cloud.dirty[id]);
    installRemote(remote, id, hadLocalChanges);
    rememberRemote(id, remote, meta.editKey || meta.readKey);
    cloudStatus(hadLocalChanges ? "Recovery copy created" : "Saved", hadLocalChanges ? "warn" : "");
    if (hadLocalChanges) toast("Cloud was newer — your edits are in a recovery copy");
    render();
  } catch (_) { cloudStatus("Offline — local copy is safe", "offline"); }
  finally { cloud.pulling[id]=false; }
}
async function openLiveTrip(link){
  const parsed = AnnasSyncCore.parseLiveLink(link); if (!parsed || !cloud.client) return false;
  cloudStatus("Opening cloud trip…");
  try {
    const remote = await cloud.client.readTrip(parsed.shortId, parsed.key);
    let local = localForShortId(remote.shortId);
    const localId = local ? local.id : newLocalId();
    installRemote(remote, localId, false); rememberRemote(localId, remote, parsed.key);
    history.replaceState(null, "", location.pathname + "?trip=" + encodeURIComponent(parsed.shortId) + location.hash);
    go("trip", localId); cloudStatus(remote.canEdit ? "Saved" : "View only", remote.canEdit ? "" : "warn");
    return true;
  } catch (_) { cloudStatus("Couldn’t open this cloud trip", "offline"); toast("Couldn’t open this trip — check the link and connection"); return false; }
}
function accountDialog(){
  if (!cloud.client) return;
  const providers=cloudConfig()?.providers || {};
  const google=providers.google ? `<div class="row"><button class="btn" id="google">Continue with Google</button></div>` : "";
  const email=providers.email ? `<div class="field" style="margin-top:1rem"><label for="magicemail">Email magic link</label><input id="magicemail" type="email" placeholder="you@example.com"></div><div class="row"><button class="btn ghost small" id="cancel">Cancel</button><div class="spacer"></div><button class="btn small" id="magic">Email me a link</button></div>` : `<div class="row"><button class="btn ghost small" id="cancel">Close</button></div>`;
  dlg.innerHTML = `<div class="dlg-body"><h2>${cloud.session ? "Organiser account" : "Save your trips across devices"}</h2>${cloud.session ? `<p class="hint">Signed in as ${esc(cloud.session.user.email || "organiser")}. Signing out never removes lists saved on this device.</p><div class="row"><button class="btn ghost small" id="cancel">Close</button><div class="spacer"></div><button class="btn small" id="signout">Sign out</button></div>` : `<p class="hint">Optional: guests can still open and edit an invite link without an account.</p>${google}${email}`}</div>`;
  dlg.querySelector("#cancel").onclick=()=>dlg.close();
  if (cloud.session) dlg.querySelector("#signout").onclick=async()=>{ await cloud.client.signOut(); cloud.session=null; updateAccount(); dlg.close(); toast("Signed out — local lists are still here"); };
  else {
    const redirect = location.origin + location.pathname + location.search;
    const googleButton=dlg.querySelector("#google"); if(googleButton) googleButton.onclick=()=>cloud.client.signInWithGoogle(redirect);
    const magicButton=dlg.querySelector("#magic"); if(magicButton) magicButton.onclick=async()=>{ const emailAddress=dlg.querySelector("#magicemail").value.trim(); if(!emailAddress) return toast("Enter your email first"); const r=await cloud.client.signInWithEmail(emailAddress, redirect); if(r.error) return toast(r.error.message); dlg.close(); toast("Magic link sent — check your email"); };
  }
  dlg.showModal();
}
function updateAccount(){ const b=document.getElementById("accountbtn"); if (!b) return; b.hidden=!cloud.available; b.textContent=cloud.session ? "Account" : "Sign in"; }
async function loadOwnedTrips(){
  if (!cloud.client || !cloud.session) return;
  try { cloud.owned=await cloud.client.listOwnedTrips(); if(view.screen==="home") render(); } catch (_) { cloud.owned=[]; }
}
function cloudShare(trip){
  const meta=cloudMeta(trip.id); if(!meta) return false;
  const edit = meta.editKey && AnnasSyncCore.buildLiveLink({baseUrl:location.origin+location.pathname,shortId:meta.shortId,key:meta.editKey});
  const read = meta.readKey && AnnasSyncCore.buildLiveLink({baseUrl:location.origin+location.pathname,shortId:meta.shortId,key:meta.readKey});
  const missing=meta.owner && !edit && !read ? `<p class="hint">This device recovered the trip through your organiser account, but it does not have the old invite secrets. Reset the links to share it again.</p>` : "";
  dlg.innerHTML=`<div class="dlg-body"><h2>Live trip links</h2><p class="hint">Edit links let the group update this shared list. View-only links are safe to send more widely.</p>${missing}<div class="cloud-actions">${edit?`<button class="btn" id="editlink">Copy live edit link</button>`:""}${read?`<button class="btn ghost" id="readlink">Copy view-only link</button>`:""}<button class="btn ghost small" id="snapshot">Copy old snapshot link</button>${meta.owner?`<button class="btn ghost small" id="rotatelinks">Reset live links</button>`:""}</div></div>`;
  if(edit) dlg.querySelector("#editlink").onclick=()=>copy(edit,"Live edit link copied 📮");
  if(read) dlg.querySelector("#readlink").onclick=()=>copy(read,"View-only link copied 📮");
  dlg.querySelector("#snapshot").onclick=()=>copy(snapshotTripUrl(trip),"Snapshot link copied 📮");
  const rotate=dlg.querySelector("#rotatelinks"); if(rotate) rotate.onclick=async()=>{ if(!confirm("Reset both live links? Old edit and view-only links will stop working.")) return; try { const fresh=await cloud.client.rotateTrip(meta.shortId); meta.readKey=fresh.readKey; meta.editKey=fresh.editKey; cloud.client.remember(trip.id,meta); dlg.close(); cloudShare(trip); toast("New live links are ready — old links no longer work"); } catch (_) { toast("Couldn’t reset links"); } };
  dlg.showModal(); return true;
}
function renderCloudControls(){
  const id=cloudTripId(), box=document.getElementById("cloudactions"), trip=id && db.trips.find(t=>t.id===id); if(!box || !trip) return;
  const meta=cloudMeta(id); if(!cloud.available){ box.innerHTML=cloudConfig()?`<span class="sync-pill offline">Cloud sync unavailable — local-only mode</span>`:""; return; }
  if(!meta){ box.innerHTML=`<button class="btn ghost small" id="synctrip">Sync this trip</button><span class="sync-pill">Local only</span>`; box.querySelector("#synctrip").onclick=async()=>{ cloudStatus("Creating cloud copy…"); try { await cloud.client.createTrip(id, trip); cloudStatus("Saved"); render(); toast("This trip now has live links"); } catch (_) { cloudStatus("Offline — still local only", "offline"); toast("Couldn’t start sync — your local trip is unchanged"); } }; return; }
  const editable=Boolean(meta.editKey || meta.owner), label=editable ? cloud.status : "View only"; box.innerHTML=`<span id="cloudstatus" class="sync-pill${editable?"":" warn"}">${esc(label)}</span>${meta.editKey && cloud.session && !meta.owner?`<button class="btn ghost small" id="claimtrip">Claim as organiser</button>`:""}`;
  if(meta.editKey && cloud.session && !meta.owner) box.querySelector("#claimtrip").onclick=async()=>{ try { await cloud.client.claimTrip(meta.shortId,meta.editKey); meta.owner=true; cloud.client.remember(id,meta); await loadOwnedTrips(); render(); toast("Trip is now in your organiser account"); } catch (_) { toast("Couldn’t claim this trip"); } };
}
function renderOwnedTrips(){
  if(view.screen!=="home" || !cloud.session || !cloud.owned.length) return;
  const holder=el(`<section class="card" style="padding:1rem 1.1rem;margin-top:1rem"><strong>Your cloud trips</strong><div class="cloud-list"></div></section>`), list=holder.querySelector(".cloud-list");
  cloud.owned.forEach(row=>{ const b=el(`<button class="cloud-trip"><strong>${esc((row.payload||{}).name||"Untitled trip")}</strong><span class="mono">Open</span></button>`); b.onclick=()=>{ const existing=localForShortId(row.short_id), id=existing?existing.id:newLocalId(); installRemote({trip:row.payload},id,false); cloud.client.remember(id,{shortId:row.short_id,version:Number(row.version),owner:true,lastSynced:new Date().toISOString()}); cloud.status="Saved"; go("trip",id); }; list.appendChild(b); }); app.appendChild(holder);
}
function cloudRendered(){ const id=cloudTripId(); app.classList.toggle("read-only", Boolean(id && cloudReadOnly(id))); renderCloudControls(); renderOwnedTrips(); }
async function initialiseCloud(){
  const config=cloudConfig(); if(!config || !window.AnnasSyncCore || !window.AnnasCloudClient) return;
  const sdk=document.createElement("script"); sdk.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.5"; sdk.async=true;
  sdk.onload=async()=>{ try { const supabase=window.supabase.createClient(config.url,config.publishableKey); cloud.client=AnnasCloudClient.createCloudClient({supabase,core:AnnasSyncCore,storage:store,origin:()=>location.origin+location.pathname}); cloud.available=true; cloud.started=true; cloud.session=await cloud.client.getSession(); updateAccount(); await loadOwnedTrips(); const live=AnnasSyncCore.parseLiveLink(location.href); if(live) await openLiveTrip(location.href); else { render(); const id=cloudTripId(); if(id) pullCloudTrip(id); } } catch (_) { cloud.available=false; updateAccount(); render(); } };
  sdk.onerror=()=>{ cloud.available=false; render(); }; document.head.appendChild(sdk);
}
window.__annasCloudSave=scheduleCloudPush;
window.__annasCloudShare=cloudShare;
window.__annasCloudRendered=cloudRendered;
window.__annasCloudNavigate=()=>{ const id=cloudTripId(); if(id) pullCloudTrip(id); };
document.getElementById("accountbtn").addEventListener("click", accountDialog);
window.addEventListener("focus", ()=>{ const id=cloudTripId(); if(id) pullCloudTrip(id); });
window.addEventListener("online", ()=>{ const id=cloudTripId(); if(id) pushCloudTrip(id); });
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible"){ const id=cloudTripId(); if(id) pullCloudTrip(id); } });
setInterval(()=>{ if(document.visibilityState==="visible" && (view.screen==="trip" || view.screen==="group")){ const id=cloudTripId(); if(id) pullCloudTrip(id); } }, 30000);

/* ============ boot ============ */
const imported = tryImport();
const pendingLive = window.AnnasSyncCore && AnnasSyncCore.parseLiveLink(location.href);
retroTagSources(db);
if (!db.trips.length && !pendingLive) seedDemo();
saveLocalOnly();
if (imported && imported.trip) go("trip", imported.trip);
else if (imported && imported.packs) go("packs");
else render();
initialiseCloud();

</script>
